<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מחולל משמרות</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 25px;
      direction: rtl;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: end;
    }

    .field {
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      height: 260px;
      direction: ltr;
      text-align: left;
      line-height: 1.6;
      white-space: pre;
      margin-top: 15px;
    }
.results {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result-row {
  display: grid;
  grid-template-columns: 1fr 80px 70px 1fr 80px 70px;
  gap: 6px;
  align-items: center;
}

.result-cell {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px;
  background: white;
  direction: ltr;
  text-align: center;
  font-size: 15px;
}

.copy-small {
  padding: 8px;
  font-size: 14px;
}
    .clear-btn {
  background: #6b7280;
}

.clear-btn:hover {
  background: #4b5563;
}

    .mode-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px 0 18px;
}

.mode-btn {
  background: #e5e7eb;
  color: #111;
  min-width: 100px;
}

.mode-btn.active {
  background: #1976d2;
  color: white;
}
  </style>
</head>

<body>

<div class="container">
  <h2>שעות הופעת ההודעה</h2>

<div class="mode-row">
  <button id="alertModeBtn" class="mode-btn active" onclick="setMode('alert')">התראה</button>
  <button id="durationModeBtn" class="mode-btn" onclick="setMode('duration')">משך</button>
</div>

  
  <div class="row">

  <div class="field">
    <label>מיום</label>
    <select id="fromDay"></select>
  </div>

  <div class="field">
    <label>עד יום</label>
    <select id="toDay"></select>
  </div>

</div>

  <div class="row">

  <div class="field">
    <label>שעת התחלה</label>
    <select id="startHour"></select>
  </div>

  <div class="field">
    <label>שעת סיום</label>
    <select id="endHour"></select>
  </div>

  <button onclick="generate()">צור רשימה</button>
<button class="clear-btn" onclick="clearResults()">נקה הכל</button>

</div>

  <div id="result" class="results"></div>


</div>

<script>
function formatDate(date) {
  const d = String(date.getDate()).padStart(2, "0");
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

function addDays(date, days) {
  const newDate = new Date(date);
  newDate.setDate(newDate.getDate() + days);
  return newDate;
}

function buildTime(hour, minute = 0) {
  return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
}

function getDisplayEndTime(endHour) {
  if (currentMode === "alert") {
    const reducedHour = endHour - 1;

    if (endHour === 0) {
      return "23:59";
    }

    return `${String(reducedHour).padStart(2, "0")}:59`;
  }

  return buildTime(endHour, 0);
}
  
function generate() {
  const startHour = Number(document.getElementById("startHour").value);
  const endHour = Number(document.getElementById("endHour").value);
  const result = document.getElementById("result");

  const { startDate, endDate } = buildDates();

  saveTachatzSettings();

  if (currentMode === "duration") {
    saveDurationHours();
  }

  let current = new Date(startDate);
  let lines = [];

  const startTime = `${String(startHour).padStart(2, "0")}:00`;
  const endTime = getDisplayEndTime(endHour);

  while (current <= endDate) {
    let finishDate = new Date(current);

    if (endHour < startHour) {
      finishDate = addDays(current, 1);
    }

    lines.push(`
      <div class="result-row">

        <div class="result-cell">
          ${formatDate(current)}
        </div>

        <div class="result-cell">
          ${startTime}
        </div>

        <button class="copy-small"
          onclick="copySingle('${formatDate(current)} ${startTime}')">
          העתק
        </button>

        <div class="result-cell">
          ${formatDate(finishDate)}
        </div>

        <div class="result-cell">
          ${endTime}
        </div>

        <button class="copy-small"
          onclick="copySingle('${formatDate(finishDate)} ${endTime}')">
          העתק
        </button>

      </div>
    `);

    current = addDays(current, 1);
  }

  result.innerHTML = lines.join("");
}
  
  let current = new Date(startDate);
  let lines = [];

  const startTime = `${String(startHour).padStart(2, "0")}:00`;
  const endTime = getDisplayEndTime(endHour);

  while (current <= endDate) {
    let finishDate = new Date(current);

    // If the ending hour is smaller than the starting hour,
    // the ending date is the next day.
    if (endHour < startHour) {
      finishDate = addDays(current, 1);
    }

    lines.push(`
      <div class="result-row">

        <div class="result-cell">
          ${formatDate(current)}
        </div>

        <div class="result-cell">
          ${startTime}
        </div>

        <button class="copy-small"
          onclick="copySingle('${formatDate(current)} ${startTime}')">
          העתק
        </button>

        <div class="result-cell">
          ${formatDate(finishDate)}
        </div>

        <div class="result-cell">
          ${endTime}
        </div>

        <button class="copy-small"
          onclick="copySingle('${formatDate(finishDate)} ${endTime}')">
          העתק
        </button>

      </div>
    `);

    current = addDays(current, 1);
  }

  result.innerHTML = lines.join("");
}
function copySingle(text) {
  navigator.clipboard.writeText(text);
}

function copyText() {
  const text = document.getElementById("result");
  text.select();
  document.execCommand("copy");
}
  function fillHourSelectors() {
  const startHour = document.getElementById("startHour");
  const endHour = document.getElementById("endHour");

  for (let hour = 5; hour <= 23; hour++) {
    const value = String(hour).padStart(2, "0");
    startHour.innerHTML += `<option value="${hour}">${value}:00</option>`;
  }

  for (let hour = 1; hour <= 23; hour++) {
    const value = String(hour).padStart(2, "0");
    endHour.innerHTML += `<option value="${hour}">${value}:00</option>`;
  }

  startHour.value = 18;
endHour.value = 22;
}
function fillDaySelectors() {
  const fromDay = document.getElementById("fromDay");
  const toDay = document.getElementById("toDay");

  for (let day = 1; day <= 31; day++) {
    fromDay.innerHTML += `<option value="${day}">${day}</option>`;
    toDay.innerHTML += `<option value="${day}">${day}</option>`;
  }
}
function buildDates() {

  const YEAR = 2026;
  const CURRENT_MONTH = 5;

  const fromDay = Number(document.getElementById("fromDay").value);
  const toDay = Number(document.getElementById("toDay").value);

  const startDate = new Date(YEAR, CURRENT_MONTH - 1, fromDay);

  let endMonth = CURRENT_MONTH;

  if (toDay < fromDay) {
    endMonth++;
  }

  const endDate = new Date(YEAR, endMonth - 1, toDay);

  return {
    startDate,
    endDate
  };
}
function clearResults() {
  document.getElementById("result").innerHTML = "";

  document.getElementById("fromDay").selectedIndex = 0;
  document.getElementById("toDay").selectedIndex = 0;

  if (currentMode === "alert") {
    document.getElementById("startHour").value = 18;
    document.getElementById("endHour").value = 22;
  }

  if (currentMode === "duration") {
    document.getElementById("startHour").value = 22;
    document.getElementById("endHour").value = 5;
  }
}

  let currentMode = "alert";

function setMode(mode) {
  currentMode = mode;
  localStorage.setItem("tachatzMode", mode);

  document.getElementById("alertModeBtn").classList.remove("active");
  document.getElementById("durationModeBtn").classList.remove("active");

  if (mode === "alert") {
    document.getElementById("alertModeBtn").classList.add("active");

    // Default for התראה
    document.getElementById("startHour").value = 18;
    document.getElementById("endHour").value = 22;
  }

  if (mode === "duration") {
    document.getElementById("durationModeBtn").classList.add("active");

    // Default for משך
    document.getElementById("startHour").value = 22;
    document.getElementById("endHour").value = 5;

    // Save the real cancellation hours for the sign message
    saveDurationHours();
  }

  saveTachatzSettings();
}

function saveTachatzSettings() {
  const startHour = Number(document.getElementById("startHour").value);
  const endHour = Number(document.getElementById("endHour").value);

  const startTime = `${String(startHour).padStart(2, "0")}:00`;
  const endTime = getDisplayEndTime(endHour);

  localStorage.setItem("tachatzMode", currentMode);
  localStorage.setItem("tachatzStartTime", startTime);
  localStorage.setItem("tachatzEndTime", endTime);
}

function saveDurationHours() {
  const startHour = Number(document.getElementById("startHour").value);
  const endHour = Number(document.getElementById("endHour").value);

  const startTime = `${String(startHour).padStart(2, "0")}:00`;
  const endTime = `${String(endHour).padStart(2, "0")}:00`;

  localStorage.setItem("tachatzDurationStartTime", startTime);
  localStorage.setItem("tachatzDurationEndTime", endTime);
}
  
fillDaySelectors();
fillHourSelectors();

localStorage.setItem("tachatzDurationStartTime", "22:00");
localStorage.setItem("tachatzDurationEndTime", "05:00");

saveTachatzSettings();
</script>

</body>
</html>
