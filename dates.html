<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מחולל משמרות</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 25px;
      direction: rtl;
    }

    .container {
      max-width: 750px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: end;
    }

    .field {
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    textarea {
      height: 260px;
      direction: ltr;
      text-align: left;
      line-height: 1.6;
      white-space: pre;
      margin-top: 15px;
    }
.results {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result-row {
  display: grid;
  grid-template-columns: 1fr 80px 70px 1fr 80px 70px;
  gap: 6px;
  align-items: center;
}

.result-cell {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px;
  background: white;
  direction: ltr;
  text-align: center;
  font-size: 15px;
}

.copy-small {
  padding: 8px;
  font-size: 14px;
}
  </style>
</head>

<body>

<div class="container">
  <h2>מחולל משמרות</h2>

  <div class="row">

  <div class="field">
    <label>מיום</label>
    <select id="fromDay"></select>
  </div>

  <div class="field">
    <label>עד יום</label>
    <select id="toDay"></select>
  </div>

</div>

  <div class="row">
    <div class="field">
      <label>סוג משמרת</label>
      <select id="shiftType">
        <option value="night">לילה 22:00 - 05:00</option>
        <option value="evening">ערב 18:00 - 21:59</option>
      </select>
    </div>

    <button onclick="generate()">צור רשימה</button>
  </div>

  <div id="result" class="results"></div>


</div>

<script>
function formatDate(date) {
  const d = String(date.getDate()).padStart(2, "0");
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

function addDays(date, days) {
  const newDate = new Date(date);
  newDate.setDate(newDate.getDate() + days);
  return newDate;
}

function generate() {
  const shiftType = document.getElementById("shiftType").value;
  const result = document.getElementById("result");

  const { startDate, endDate } = buildDates();

  let current = new Date(startDate);
  let lines = [];

  while (current <= endDate) {
    if (shiftType === "night") {
      const nextDay = addDays(current, 1);

      lines.push(`
  <div class="result-row">

    <div class="result-cell">
      ${formatDate(current)}
    </div>

    <div class="result-cell">
      22:00
    </div>

    <button class="copy-small"
      onclick="copySingle('${formatDate(current)} 22:00')">
      העתק
    </button>

    <div class="result-cell">
      ${formatDate(nextDay)}
    </div>

    <div class="result-cell">
      05:00
    </div>

    <button class="copy-small"
      onclick="copySingle('${formatDate(nextDay)} 05:00')">
      העתק
    </button>

  </div>
`);
    }

    if (shiftType === "evening") {
      lines.push(`
  <div class="result-row">

    <div class="result-cell">
      ${formatDate(current)}
    </div>

    <div class="result-cell">
      18:00
    </div>

    <button class="copy-small"
      onclick="copySingle('${formatDate(current)} 18:00')">
      העתק
    </button>

    <div class="result-cell">
      ${formatDate(current)}
    </div>

    <div class="result-cell">
      21:59
    </div>

    <button class="copy-small"
      onclick="copySingle('${formatDate(current)} 21:59')">
      העתק
    </button>

  </div>
`);
    }

    current = addDays(current, 1);
  }

  result.innerHTML = lines.join("");
}

function copySingle(text) {
  navigator.clipboard.writeText(text);
}

function copyText() {
  const text = document.getElementById("result");
  text.select();
  document.execCommand("copy");
}
function fillDaySelectors() {
  const fromDay = document.getElementById("fromDay");
  const toDay = document.getElementById("toDay");

  for (let day = 1; day <= 31; day++) {
    fromDay.innerHTML += `<option value="${day}">${day}</option>`;
    toDay.innerHTML += `<option value="${day}">${day}</option>`;
  }
}
function buildDates() {

  const YEAR = 2026;
  const CURRENT_MONTH = 5;

  const fromDay = Number(document.getElementById("fromDay").value);
  const toDay = Number(document.getElementById("toDay").value);

  const startDate = new Date(YEAR, CURRENT_MONTH - 1, fromDay);

  let endMonth = CURRENT_MONTH;

  if (toDay < fromDay) {
    endMonth++;
  }

  const endDate = new Date(YEAR, endMonth - 1, toDay);

  return {
    startDate,
    endDate
  };
}
fillDaySelectors();
</script>

</body>
</html>
