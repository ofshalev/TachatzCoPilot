<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סוג אירוע</title>

  <style>
    body {
      margin: 0;
      padding: 22px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      direction: rtl;
    }

    .box {
      max-width: 700px;
      margin: 0 auto;
      padding: 22px;
      border: 1px solid #ddd;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 22px;
      text-align: center;
      font-size: 24px;
    }

    .type-buttons {
      display: flex;
      gap: 18px;
      justify-content: center;
    }

    .type-btn {
      min-width: 180px;
      padding: 18px 26px;
      border: none;
      border-radius: 16px;
      background: #f1f3f6;
      color: #222;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      transition: 0.15s;
    }

    .type-btn:hover {
      background: #e2e7f3;
    }

    .type-btn:active {
      transform: translateY(1px);
    }

    .type-btn.active {
      background: #2f5bea;
      color: white;
    }
  </style>
</head>

<body>

  <div class="box">
    <h3>סוג אירוע</h3>

    <div class="type-buttons">
      <button type="button" class="type-btn" onclick="selectEventType('realtime')">
        זמן אמת
      </button>

      <button type="button" class="type-btn" onclick="selectEventType('future')">
        עתידי
      </button>
    </div>
  </div>

  <script>
    function selectEventType(type) {
      localStorage.setItem("tachatzEventType", type);

      // Move to next page/tab
      window.location.href = "event-title.html";
    }
  </script>

</body>
</html>
