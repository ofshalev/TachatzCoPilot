<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פתיחת אירוע</title>

  <style>
    body {
      margin: 0;
      padding: 22px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      direction: rtl;
    }

    .event-title-box {
      background: white;
      padding: 18px;
      border-radius: 18px;
      max-width: 1100px;
      margin: 0 auto;
      direction: rtl;
    }

    .event-title-box h3 {
      margin-top: 0;
      margin-bottom: 16px;
      text-align: right;
    }

    .event-title-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      align-items: end;
    }

    .field label,
    .result-label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    #eventTitleResult {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      direction: rtl;
    }

    #eventTitleResult {
      margin-top: 8px;
      resize: none;
      direction: rtl;
      height: 60px;
    }

    .copy-btn {
      margin-top: 10px;
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      background: #2f5bea;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn:active {
      transform: translateY(1px);
    }

    .clear-btn {
  margin-top: 10px;
  margin-right: 8px;
  padding: 9px 18px;
  border: none;
  border-radius: 10px;
  background: #777;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.clear-btn:active {
  transform: translateY(1px);
}
    .section-divider {
  margin: 22px 0;
  border: none;
  border-top: 1px solid #ddd;
}

.event-description-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 14px;
  align-items: start;
}

.verify-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.verify-options label {
  font-weight: normal;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 0;
}

.verify-options input {
  width: auto;
}

#eventDescriptionResult {
  margin-top: 8px;
  resize: none;
  direction: rtl;
  height: 85px;
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 15px;
  font-family: Arial, sans-serif;
}
    .event-title-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  gap: 12px;
  align-items: end;
  direction: rtl;
}

.field {
  display: flex;
  flex-direction: column;
}

.field label {
  text-align: right;
  margin-bottom: 6px;
  font-weight: bold;
}

.field input,
.field select {
  width: 100%;
  height: 42px;
  box-sizing: border-box;
}
    .section-title {
  text-align: right;
  margin-bottom: 18px;
}

.event-title-row {
  width: 100%;
  display: grid !important;
  grid-template-columns: repeat(5, 1fr) !important;
  gap: 12px !important;
  align-items: end !important;
  direction: rtl !important;
}

.event-title-row .field {
  display: flex !important;
  flex-direction: column !important;
  min-width: 0 !important;
}

.event-title-row label {
  text-align: right !important;
  margin-bottom: 6px !important;
  font-weight: bold !important;
}

.event-title-row input,
.event-title-row select {
  width: 100% !important;
  height: 42px !important;
  box-sizing: border-box !important;
}

.created-title-label {
  display: block;
  text-align: right;
  margin-top: 14px;
  margin-bottom: 6px;
  font-weight: bold;
}

#eventTitleOutput {
  width: 100%;
  min-height: 58px;
  box-sizing: border-box;
}
    /* Restore compact event title layout */
.event-title-row {
  max-width: 1120px !important;
  margin: 0 auto !important;

  display: grid !important;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr !important;
  gap: 12px !important;
  align-items: end !important;
  direction: rtl !important;
}

.event-title-row .field {
  display: flex !important;
  flex-direction: column !important;
}

.event-title-row label {
  text-align: right !important;
  margin-bottom: 6px !important;
  font-weight: bold !important;
}

.event-title-row input,
.event-title-row select {
  width: 100% !important;
  height: 42px !important;
  border: 1px solid #ccc !important;
  border-radius: 8px !important;
  padding: 8px 10px !important;
  box-sizing: border-box !important;
}

#eventTitleOutput {
  max-width: 1120px !important;
  margin: 10px auto 0 !important;
  display: block !important;
  min-height: 58px !important;
  border-radius: 8px !important;
}

.created-title-label {
  max-width: 1120px !important;
  margin: 14px auto 6px !important;
  display: block !important;
  text-align: right !important;
}
  </style>
</head>

<body>
<h3 class="section-title">כותרת אירוע</h3>

<div class="event-title-row">

 <div class="field">
    <label for="reason">סיבה</label>
    <select id="reason" onchange="buildEventTitle(); buildEventDescription();">
      <option value="עבודות">עבודות</option>
      <option value="תאונה">תאונה</option>
      <option value="חסימה">חסימה</option>
      <option value="רכב תקוע">רכב תקוע</option>
    </select>
  </div>
  
  <div class="field">
    <label for="citySelect">עיר</label>
    <select id="citySelect" onchange="updateStreetList();">
      <option value="">בחר עיר</option>
    </select>
  </div>

 

  <div class="field">
    <label for="streetSelect">רחוב</label>
    <select id="streetSelect" onchange="buildEventTitle(); buildEventDescription();" disabled>
      <option value="">בחר רחוב</option>
    </select>
  </div>

  <div class="field">
    <label for="startDate">התחלה</label>
    <input id="startDate" type="date" onchange="buildEventTitle(); buildEventDescription();">
  </div>

  <div class="field">
    <label for="endDate">סיום</label>
    <input id="endDate" type="date" onchange="buildEventTitle(); buildEventDescription();">
  </div>

</div>

<label class="created-title-label" for="eventTitleOutput">כותרת שנוצרה</label>
<textarea id="eventTitleOutput" readonly></textarea>
    <button type="button" class="copy-btn" onclick="copyEventTitle()">העתק כותרת</button>
    <button type="button" class="clear-btn" onclick="clearEventTitleFields()">נקה הכל</button>
    <hr class="section-divider">

<h3>תיאור האירוע</h3>

<div class="event-description-grid">

  <div class="field">
    <label>מפעיל</label>
    <select id="eventOperator" onchange="buildEventDescription()">
      <option value="אגד">אגד</option>
      <option value="אפיקים">אפיקים</option>
      <option value="דן">דן</option>
      <option value="מטרופולין">מטרופולין</option>
      <option value="סופרבוס">סופרבוס</option>
      <option value="קווים">קווים</option>
    </select>
  </div>

  <div class="field">
    <label>אימות</label>

    <div class="verify-options">
      <label><input type="checkbox" value="תמונות" onchange="buildEventDescription()"> תמונות</label>
      <label><input type="checkbox" value="ווייז" onchange="buildEventDescription()"> ווייז</label>
      <label><input type="checkbox" value="מצלמות" onchange="buildEventDescription()"> מצלמות</label>
      <label><input type="checkbox" value="מוקד עירוני" onchange="buildEventDescription()"> מוקד עירוני</label>
      <label><input type="checkbox" value="נתיבי ישראל" onchange="buildEventDescription()"> נתיבי ישראל</label>
    </div>
  </div>

</div>

<label class="result-label">תיאור שנוצר</label>
<textarea id="eventDescriptionResult" readonly></textarea>

<button type="button" class="copy-btn" onclick="copyEventDescription()">העתק תיאור</button>
  </div>

<script src="streets-db.js"></script>
  
  <script>
    

 <script>
function getTodayValue() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function setTodayAsDefaultEventDay() {
  const startDate = document.getElementById("startDate");
  const endDate = document.getElementById("endDate");

  if (startDate) {
    startDate.value = getTodayValue();
  }

  if (endDate) {
    endDate.value = "";
  }
}

function fillCityList() {
  const citySelect = document.getElementById("citySelect");
  if (!citySelect || !window.CITIES) return;

  citySelect.innerHTML = '<option value="">בחר עיר</option>';

  window.CITIES.forEach(city => {
    const option = document.createElement("option");
    option.value = city;
    option.textContent = city;
    citySelect.appendChild(option);
  });
}

function updateStreetList() {
  const city = document.getElementById("citySelect").value;
  const streetSelect = document.getElementById("streetSelect");

  streetSelect.innerHTML = '<option value="">בחר רחוב</option>';

  if (!city || !window.STREETS_BY_CITY || !window.STREETS_BY_CITY[city]) {
    streetSelect.disabled = true;
    buildEventTitle();
    buildEventDescription();
    return;
  }

  window.STREETS_BY_CITY[city].forEach(street => {
    const option = document.createElement("option");
    option.value = street;
    option.textContent = street;
    streetSelect.appendChild(option);
  });

  streetSelect.disabled = false;

  buildEventTitle();
  buildEventDescription();
}

function formatSingleDate(dateValue) {
  if (!dateValue) return "";

  const parts = dateValue.split("-");
  const year = parts[0];
  const month = parts[1];
  const day = parts[2];

  return `${day}.${month}.${year}`;
}

function formatDateRange(startValue, endValue) {
  if (!startValue) return "";

  if (!endValue) {
    return formatSingleDate(startValue);
  }

  const startParts = startValue.split("-");
  const endParts = endValue.split("-");

  const startYear = startParts[0];
  const startMonth = startParts[1];
  const startDay = startParts[2];

  const endYear = endParts[0];
  const endMonth = endParts[1];
  const endDay = endParts[2];

  if (startYear === endYear && startMonth === endMonth) {
    return `${startDay}-${endDay}.${endMonth}.${endYear}`;
  }

  if (startYear === endYear) {
    return `${startDay}.${startMonth}-${endDay}.${endMonth}.${endYear}`;
  }

  return `${startDay}.${startMonth}.${startYear}-${endDay}.${endMonth}.${endYear}`;
}

function buildEventTitle() {
  const city = document.getElementById("citySelect")?.value || "";
  const street = document.getElementById("streetSelect")?.value || "";
  const reason = document.getElementById("reason")?.value || "";
  const startDate = document.getElementById("startDate")?.value || "";
  const endDate = document.getElementById("endDate")?.value || "";
  const resultBox = document.getElementById("eventTitleOutput");

  if (!resultBox) return;

  const datePart = formatDateRange(startDate, endDate);

  const parts = [];

  if (city) parts.push(city);
  if (reason) parts.push(reason);
  if (street) parts.push(street);
  if (datePart) parts.push(datePart);

  resultBox.value = parts.join(", ");

  buildEventDescription();
}

function copyEventTitle() {
  const textBox = document.getElementById("eventTitleOutput");
  if (!textBox) return;

  navigator.clipboard.writeText(textBox.value);
}

function clearEventTitleFields() {
  document.getElementById("reason").selectedIndex = 0;
  document.getElementById("citySelect").value = "";

  const streetSelect = document.getElementById("streetSelect");
  streetSelect.innerHTML = '<option value="">בחר רחוב</option>';
  streetSelect.disabled = true;

  setTodayAsDefaultEventDay();

  buildEventTitle();
  buildEventDescription();
}

function getSelectedVerifications() {
  const checked = document.querySelectorAll(".verify-options input[type='checkbox']:checked");
  return Array.from(checked).map(cb => cb.value);
}

function formatVerificationText(items) {
  if (items.length === 0) return "";

  const withBet = items.map(item => {
    if (item === "ווייז") return "בווייז";
    if (item === "מוקד עירוני") return "במוקד עירוני";
    if (item === "נתיבי ישראל") return "בנתיבי ישראל";
    return "ב" + item;
  });

  if (withBet.length === 1) {
    return withBet[0];
  }

  if (withBet.length === 2) {
    return withBet[0] + " ו" + withBet[1];
  }

  return withBet.slice(0, -1).join(", ") + " ו" + withBet[withBet.length - 1];
}

function buildEventDescription() {
  const operator = document.getElementById("eventOperator")?.value || "";
  const reason = document.getElementById("reason")?.value || "";
  const street = document.getElementById("streetSelect")?.value || "";
  const city = document.getElementById("citySelect")?.value || "";
  const resultBox = document.getElementById("eventDescriptionResult");

  if (!resultBox) return;

  let text = "";

  if (operator || reason || street || city) {
    text = `התקבל דיווח ממפעיל ${operator}`;

    if (reason) {
      text += ` על ${reason}`;
    }

    if (street) {
      text += ` ברחוב ${street}`;
    }

    if (city) {
      text += ` ב${city}`;
    }

    text += ".";
  }

  const verificationItems = getSelectedVerifications();
  const verificationText = formatVerificationText(verificationItems);

  if (verificationText) {
    text += ` אומת ${verificationText}.`;
  }

  resultBox.value = text;
}

function copyEventDescription() {
  const textBox = document.getElementById("eventDescriptionResult");
  if (!textBox) return;

  navigator.clipboard.writeText(textBox.value);
}

window.onload = function () {
  fillCityList();
  setTodayAsDefaultEventDay();
  buildEventTitle();
  buildEventDescription();
};
</script>
  </script>

</body>
</html>
