<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פתיחת אירוע</title>

  <style>
    body {
      margin: 0;
      padding: 22px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      direction: rtl;
    }

    .event-title-box {
      background: white;
      padding: 18px;
      border-radius: 18px;
      max-width: 1100px;
      margin: 0 auto;
      direction: rtl;
    }

    .event-title-box h3 {
      margin-top: 0;
      margin-bottom: 16px;
      text-align: right;
    }

    .event-title-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      align-items: end;
    }

    .field label,
    .result-label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    #eventTitleResult {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      direction: rtl;
    }

    #eventTitleResult {
      margin-top: 8px;
      resize: none;
      direction: rtl;
      height: 60px;
    }

    .copy-btn {
      margin-top: 10px;
      padding: 9px 18px;
      border: none;
      border-radius: 10px;
      background: #2f5bea;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .copy-btn:active {
      transform: translateY(1px);
    }

    .clear-btn {
  margin-top: 10px;
  margin-right: 8px;
  padding: 9px 18px;
  border: none;
  border-radius: 10px;
  background: #777;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.clear-btn:active {
  transform: translateY(1px);
}
    .section-divider {
  margin: 22px 0;
  border: none;
  border-top: 1px solid #ddd;
}

.event-description-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 14px;
  align-items: start;
}

.verify-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.verify-options label {
  font-weight: normal;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 0;
}

.verify-options input {
  width: auto;
}

#eventDescriptionResult {
  margin-top: 8px;
  resize: none;
  direction: rtl;
  height: 85px;
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 15px;
  font-family: Arial, sans-serif;
}
  </style>
</head>

<body>

  <div class="event-title-box">
    <h3>כותרת אירוע</h3>

    <div class="event-title-grid">

      <div class="field">
        <label>עיר</label>
       
<input id="eventCity" list="citiesList" placeholder="לדוגמה: פתח תקווה" oninput="generateEventTitle(); generateEventDescription();">

<datalist id="citiesList">
  <option value="אבן יהודה">
  <option value="אור יהודה">
  <option value="אזור">
  <option value="אלעד">
  <option value="אשדוד">
  <option value="באר יעקב">
  <option value="בית דגן">
  <option value="בני ברק">
  <option value="בת ים">
  <option value="ג'לג'וליה">
  <option value="גבעת שמואל">
  <option value="גבעתיים">
  <option value="גדרה">
  <option value="גן יבנה">
  <option value="גני תקווה">
  <option value="הוד השרון">
  <option value="הרצליה">
  <option value="חולון">
  <option value="טייבה">
  <option value="טירה">
  <option value="יבנה">
  <option value="יהוד">
  <option value="כוכב יאיר">
  <option value="כפר חב&quot;ד">
  <option value="כפר יונה">
  <option value="כפר סבא">
  <option value="כפר סירקין">
  <option value="כפר קאסם">
  <option value="לוד">
  <option value="מזכרת בתיה">
  <option value="נחלים">
  <option value="נס ציונה">
  <option value="נתניה">
  <option value="פרדסיה">
  <option value="פתח תקווה">
  <option value="קדימה צורן">
  <option value="קלנסווה">
  <option value="קרית אונו">
  <option value="קרית עקרון">
  <option value="ראש העין">
  <option value="ראשון לציון">
  <option value="רחובות">
  <option value="רמלה">
  <option value="רמת גן">
  <option value="רמת השרון">
  <option value="רעננה">
  <option value="שוהם">
  <option value="תל אביב">
  <option value="תל מונד">
  <option value="תנובות">
</datalist>
      </div>

      <div class="field">
        <label>סיבה</label>
        <select id="eventReason" onchange="buildEventTitle()">
          <option value="עבודות">עבודות</option>
          <option value="תאונת דרכים">תאונת דרכים</option>
          <option value="רכב תקוע">רכב תקוע</option>
        </select>
      </div>

      <div class="field">
        <label>רחוב / כביש / דרך</label>
        <input type="text" id="eventStreet" placeholder="לדוגמה: ז'בוטינסקי" oninput="buildEventTitle()">
      </div>

      <div class="field">
        <label>יום</label>
        <input type="date" id="eventStartDay" onchange="buildEventTitle()">
      </div>

      <div class="field">
        <label>יום סיום</label>
        <input type="date" id="eventEndDay" onchange="buildEventTitle()">
      </div>

    </div>

    <label class="result-label">כותרת שנוצרה</label>
    <textarea id="eventTitleResult" readonly></textarea>

    <button type="button" class="copy-btn" onclick="copyEventTitle()">העתק כותרת</button>
    <button type="button" class="clear-btn" onclick="clearEventTitleFields()">נקה הכל</button>
    <hr class="section-divider">

<h3>תיאור האירוע</h3>

<div class="event-description-grid">

  <div class="field">
    <label>מפעיל</label>
    <select id="eventOperator" onchange="buildEventDescription()">
      <option value="אגד">אגד</option>
      <option value="אפיקים">אפיקים</option>
      <option value="דן">דן</option>
      <option value="מטרופולין">מטרופולין</option>
      <option value="סופרבוס">סופרבוס</option>
      <option value="קווים">קווים</option>
    </select>
  </div>

  <div class="field">
    <label>אימות</label>

    <div class="verify-options">
      <label><input type="checkbox" value="תמונות" onchange="buildEventDescription()"> תמונות</label>
      <label><input type="checkbox" value="ווייז" onchange="buildEventDescription()"> ווייז</label>
      <label><input type="checkbox" value="מצלמות" onchange="buildEventDescription()"> מצלמות</label>
      <label><input type="checkbox" value="מוקד עירוני" onchange="buildEventDescription()"> מוקד עירוני</label>
      <label><input type="checkbox" value="נתיבי ישראל" onchange="buildEventDescription()"> נתיבי ישראל</label>
    </div>
  </div>

</div>

<label class="result-label">תיאור שנוצר</label>
<textarea id="eventDescriptionResult" readonly></textarea>

<button type="button" class="copy-btn" onclick="copyEventDescription()">העתק תיאור</button>
  </div>

  <script>
    

  function setTodayAsDefaultEventDay() {
  const startDayInput = document.getElementById("eventStartDay");
  const endDayInput = document.getElementById("eventEndDay");

  if (!startDayInput) return;

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate()).padStart(2, "0");

  startDayInput.value = `${yyyy}-${mm}-${dd}`;

  // End day stays empty by default
  if (endDayInput) {
    endDayInput.value = "";
  }
}
    
function formatSingleDate(dateValue) {
  if (!dateValue) return "";

  const parts = dateValue.split("-");
  const year = parts[0];
  const month = parts[1];
  const day = parts[2];

  return `${day}.${month}.${year}`;
}

function formatDateRange(startValue, endValue) {
  if (!startValue) return "";

  if (!endValue) {
    return formatSingleDate(startValue);
  }

  const startParts = startValue.split("-");
  const endParts = endValue.split("-");

  const startYear = startParts[0];
  const startMonth = startParts[1];
  const startDay = startParts[2];

  const endYear = endParts[0];
  const endMonth = endParts[1];
  const endDay = endParts[2];

  // Same month and same year: 10-11.05.2026
  if (startYear === endYear && startMonth === endMonth) {
    return `${startDay}-${endDay}.${endMonth}.${endYear}`;
  }

  // Same year, different month: 30.05-02.06.2026
  if (startYear === endYear) {
    return `${startDay}.${startMonth}-${endDay}.${endMonth}.${endYear}`;
  }

  // Different years: 31.12.2026-01.01.2027
  return `${startDay}.${startMonth}.${startYear}-${endDay}.${endMonth}.${endYear}`;
}

function buildEventTitle() {
  const city = document.getElementById("eventCity").value.trim();
  const reason = document.getElementById("eventReason").value;
  const street = document.getElementById("eventStreet").value.trim();
  const startDay = document.getElementById("eventStartDay").value;
  const endDay = document.getElementById("eventEndDay").value;

  const datePart = formatDateRange(startDay, endDay);

  const parts = [];

  if (city) parts.push(city);
  if (reason) parts.push(reason);
  if (street) parts.push(street);
  if (datePart) parts.push(datePart);

  document.getElementById("eventTitleResult").value = parts.join(", ");
  buildEventDescription();
}
    function copyEventTitle() {
  const textBox = document.getElementById("eventTitleResult");
  if (!textBox) return;

  navigator.clipboard.writeText(textBox.value);
}

function clearEventTitleFields() {
  document.getElementById("eventCity").value = "";
  document.getElementById("eventStreet").value = "";

  document.getElementById("eventReason").selectedIndex = 0;

  setTodayAsDefaultEventDay();

  document.getElementById("eventEndDay").value = "";

  buildEventTitle();
}

function getSelectedVerifications() {
  const checked = document.querySelectorAll(".verify-options input[type='checkbox']:checked");
  return Array.from(checked).map(cb => cb.value);
}

function formatVerificationText(items) {
  if (items.length === 0) return "";

  const withBet = items.map(item => {
    if (item === "ווייז") return "בווייז";
    if (item === "מוקד עירוני") return "במוקד עירוני";
    if (item === "נתיבי ישראל") return "בנתיבי ישראל";
    return "ב" + item;
  });

  if (withBet.length === 1) {
    return withBet[0];
  }

  if (withBet.length === 2) {
    return withBet[0] + " ו" + withBet[1];
  }

  return withBet.slice(0, -1).join(", ") + " ו" + withBet[withBet.length - 1];
}

function buildEventDescription() {
  const operator = document.getElementById("eventOperator")?.value || "";
  const reason = document.getElementById("eventReason")?.value || "";
  const street = document.getElementById("eventStreet")?.value.trim() || "";
  const city = document.getElementById("eventCity")?.value.trim() || "";
  const resultBox = document.getElementById("eventDescriptionResult");

  if (!resultBox) return;

  let text = "";

  if (operator || reason || street || city) {
    text = `התקבל דיווח ממפעיל ${operator}`;

    if (reason) {
      text += ` על ${reason}`;
    }

    if (street) {
      text += ` ברחוב ${street}`;
    }

    if (city) {
      text += ` ב${city}`;
    }

    text += ".";
  }

  const verificationItems = getSelectedVerifications();
  const verificationText = formatVerificationText(verificationItems);

  if (verificationText) {
    text += ` אומת ${verificationText}.`;
  }

  resultBox.value = text;
}

function copyEventDescription() {
  const textBox = document.getElementById("eventDescriptionResult");
  if (!textBox) return;

  navigator.clipboard.writeText(textBox.value);
}
    
window.onload = function () {
  setTodayAsDefaultEventDay();
  buildEventTitle();
  buildEventDescription();
};
  </script>

</body>
</html>
